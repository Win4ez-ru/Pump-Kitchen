name: iOS CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ios-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
      - name: Show toolchain
        run: xcodebuild -version
      - name: Run unit and UI tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project "Pump Kitchen.xcodeproj" \
            -scheme "Pump Kitchen" \
            -destination 'platform=iOS Simulator,name=iPhone 17,OS=latest' \
            CODE_SIGNING_ALLOWED=NO
